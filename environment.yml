# Auto-generated by init.py — profile: gpu
# 重新產生：python init.py [--force-cpu | --force-gpu]
name: ai-office
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pip:
    # --- PyTorch + CUDA (GPU acceleration) ---
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch
    - torchvision

    # --- ONNX Runtime GPU (for RapidOCR GPU acceleration) ---
    - onnxruntime-gpu
    # --- Core (data processing, cross-platform) ---
    - openpyxl
    - xlrd
    - chardet
    - pyyaml
    - requests

    # --- Document processing (cross-platform) ---
    - python-docx
    - python-pptx
    - PyMuPDF
    - pdfplumber
    - rapidocr
    - docling

    # --- MCP server (cross-platform) ---
    - mcp

    # --- MES SSRS integration (cross-platform) ---
    - requests-ntlm
    - playwright

    # --- Windows-only: COM automation for MCP Office servers ---
    - pywin32; sys_platform == "win32"

    # --- Utilities ---
    - python-dotenv
    - pandas

    # --- AutoCAD DXF 解析與 3D 建模 ---
    - ezdxf
    - trimesh
    - shapely
    - matplotlib
    - mapbox-earcut
    - manifold3d

    # --- Oracle Database ---
    - oracledb

    # --- Data Science / ML ---
    - scikit-learn
    - statsmodels
    - matplotlib
    - lightgbm
    - shap
    - ruptures
    - mlxtend

    # --- Causal / Bayesian ---
    - pgmpy

    # --- Knowledge Base: vector search & workflow FSM ---
    - sqlite-vec
    - transitions
