summary: |
  T3.1: Added _ensure_fts_schema() and _rebuild_fts() helpers to kb.py.
  FTS5 virtual table node_fts uses trigram tokenizer (unicode61 fallback).
  cmd_sync now calls _rebuild_fts(kb.conn) after sync, keeping index current.
  kb_schema.sql updated with comment noting runtime-only FTS table.

  T3.2: Added _bm25_search() method and rewrote related_semantic() in kb_index.py
  to use Reciprocal Rank Fusion (RRF, k=60) over dense cosine + BM25 legs.
  Dense leg gracefully absent when Ollama unavailable; BM25-only RRF still runs.
  Total fallback to LIKE-based related() when both legs produce no results.

