known_risks:
  - FTS index is rebuilt wholesale on every sync (DELETE + INSERT). For the current
    ~1200 active nodes this is fast (<1s). If the corpus grows to 10k+ nodes,
    consider incremental update via AFTER INSERT/UPDATE/DELETE triggers on nodes table.
  - Trigram tokenizer requires SQLite >= 3.35 (bundled with Python 3.9+). The
    unicode61 fallback handles older environments but loses CJK substring matching.
  - Dense leg is skipped entirely when Ollama is down; RRF then runs BM25-only.
    Callers that relied on the old cosine sim= output format will see rrf= instead —
    minor display change but not a breaking contract change (no external consumers).

