known_risks:
  - FTS sanitizer strips all non-ASCII word chars. For purely CJK nodes with no ASCII
    terms, safe.strip() will be empty and _bm25_neighbors returns []. These nodes produce
    no proposals. A future improvement: extract CJK trigrams directly as FTS5 MATCH terms.
  - gpt-oss serial 3s delay means 768 nodes * 5 neighbors = ~3840 LLM calls ~3.2 hours.
    The --batch-size arg allows partial runs; resumable design prevents re-processing.
  - review-edges uses INSERT OR REPLACE INTO edges which overwrites confidence/source on
    duplicate (source_id, target_id, relation). This is intentional but may clobber
    manually curated edges if LLM proposes the same relation.
  - edge_proposals UNIQUE constraint is on (source_id, target_id, relation, extractor).
    Different extractor versions can create duplicate semantic edges; build-edges dedup
    logic does not yet account for edge_proposals-sourced edges.

