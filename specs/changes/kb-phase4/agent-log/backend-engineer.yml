summary: |
  T4.1: Added edge_proposals staging table + 2 indexes to _ensure_schema() in kb.py (idempotent
  CREATE TABLE IF NOT EXISTS). Also updated kb_schema.sql with the DDL as documentation.
  The table enforces EVO-013 sidecar principle: LLM proposals never go directly to edges.

  T4.2: Created shared/tools/edge_extractor.py. Iterates active decision/learning nodes,
  sanitizes node_text for FTS5 MATCH (ASCII-only tokens to avoid CJK punctuation syntax errors),
  calls gpt-oss API (Ollama/OpenAI-compatible), writes non-"none" relations to edge_proposals.
  Resumable by checking existing source_ids for the extractor version. 3s serial delay (no
  concurrency per feedback_api_concurrency.md). Added cmd_extract_edges to kb.py + subparser.

  T4.3: Added cmd_review_edges to kb.py. Supports interactive mode (stdin) and non-interactive
  auto-approve-threshold mode. Approved proposals are written to edges table with auto_generated=0,
  and edge_proposals.status updated to approved/rejected. Added subparser + cmd_map entry.

  Bug fixed during implementation: RELATION_PROMPT used .format() with literal {braces} in
  JSON example -- escaped to {{ }} to avoid KeyError. _sanitize_fts_query() added to handle
  FTS5 syntax errors from mixed CJK+ASCII text (= signs, full-width punctuation).

