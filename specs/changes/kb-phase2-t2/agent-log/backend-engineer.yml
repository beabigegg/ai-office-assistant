known_risks:
  - |
    641 LRN-* nodes > 512 in MD: the 129 extra come from non-ECR-L learning nodes
    (DXF-L*, EA-L*, BOM-L* etc.) that already had LRN-* IDs from a prior sync.
    These are correct — only the ECR-L* sequential IDs were unstable.
  - |
    Hash is computed from DB target field (truncated to 80 chars), not raw MD title.
    Future re-sync uses raw MD title (also 80 chars). If a title changes the LRN-* ID
    will change. This is expected behaviour — content-addressed stability.
  - |
    The _learning_legacy_map property reads learning_id_legacy_map.json at runtime.
    If the JSON file is deleted, ECR-L* refs in decisions.md will not resolve to
    LRN-* but will be stored as ECR-L* edge targets (which are now orphaned).
    Mitigation: keep learning_id_legacy_map.json in VCS or regenerate via dry-run.
